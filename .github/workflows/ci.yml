name: CI

on:
  push:
    branches:
      - master
      - workshop
    tags:
      - "step.*"
  pull_request:
    branches:
      - master
      - workshop

jobs:
  workshop-steps:
    runs-on: ubuntu-latest
    env:
      BITCOIN_VERSION: "31.0"
      BITCOIN_PLATFORM: x86_64-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Cap'n Proto
        run: |
          sudo apt-get update
          sudo apt-get install capnproto libcapnp-dev

      - name: Cache Bitcoin Core release
        uses: actions/cache@v4
        with:
          path: bitcoin-core
          key: bitcoin-core-${{ env.BITCOIN_VERSION }}-${{ env.BITCOIN_PLATFORM }}

      - name: Install Bitcoin Core release
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -x bitcoin-core/bin/bitcoin ]]; then
            archive="bitcoin-${BITCOIN_VERSION}-${BITCOIN_PLATFORM}.tar.gz"
            curl -fsSLO "https://bitcoincore.org/bin/bitcoin-core-${BITCOIN_VERSION}/${archive}"
            mkdir -p bitcoin-core
            tar -xzf "${archive}" -C bitcoin-core --strip-components=1
          fi

          ./bitcoin-core/bin/bitcoin --version

      - name: Start Bitcoin Core
        shell: bash
        run: |
          set -euo pipefail

          ./bitcoin-core/bin/bitcoin node -datadir="${GITHUB_WORKSPACE}/bitcoin" -daemon

          ipc_ready=0
          for _ in {1..60}; do
            if [[ -S "${GITHUB_WORKSPACE}/bitcoin/signet/node.sock" ]]; then
              ipc_ready=1
              break
            fi
            sleep 1
          done

          if [[ "${ipc_ready}" -ne 1 ]]; then
            echo "Bitcoin Core IPC socket was not created"
            exit 1
          fi

          rpc_ready=0
          for _ in {1..60}; do
            if ./bitcoin-core/bin/bitcoin-cli -datadir="${GITHUB_WORKSPACE}/bitcoin" getblockchaininfo; then
              rpc_ready=1
              break
            fi
            sleep 1
          done

          if [[ "${rpc_ready}" -ne 1 ]]; then
            echo "Bitcoin Core RPC did not become ready"
            exit 1
          fi

          for height in $(seq 1 17); do
            block="$(tr -d '\n' < "test/fixtures/block_${height}.hex")"
            ./bitcoin-core/bin/bitcoin-cli \
              -datadir="${GITHUB_WORKSPACE}/bitcoin" \
              submitblock "${block}"
          done

      - name: Check step.1
        shell: bash
        run: |
          set -euo pipefail
          git checkout --force step.1
          echo "step.1 has no Rust project yet; skipping Rust checks"

      - name: Check step.2
        shell: bash
        run: |
          set -euo pipefail
          git checkout --force step.2
          echo "step.2 has no Rust project yet; skipping Rust checks"

      - name: Check step.3
        shell: bash
        run: |
          set -euo pipefail
          git checkout --force step.3
          cargo fmt --check
          cargo check --locked
          cargo run --locked

      - name: Check step.4
        shell: bash
        run: |
          set -euo pipefail
          git checkout --force step.4
          cargo fmt --check
          cargo check --locked
          cargo run --locked

      - name: Check step.4.solution
        shell: bash
        run: |
          set -euo pipefail
          git checkout --force step.4.solution
          cargo fmt --check
          cargo check --locked
          cargo run --locked

      - name: Check step.5
        shell: bash
        run: |
          set -euo pipefail
          git checkout --force step.5
          cargo fmt --check
          cargo check --locked
          cargo run --locked

      - name: Check step.5.solution
        shell: bash
        run: |
          set -euo pipefail
          git checkout --force step.5.solution
          cargo fmt --check
          cargo check --locked
          cargo run --locked

      - name: Check step.6
        shell: bash
        run: |
          set -euo pipefail
          git checkout --force step.6
          cargo fmt --check
          cargo check --locked
          timeout 180s cargo run --release --locked -- --ci --threads 2

      - name: Check step.6.solution
        shell: bash
        run: |
          set -euo pipefail
          git checkout --force step.6.solution
          cargo fmt --check
          cargo check --locked
          timeout 180s cargo run --release --locked -- --ci --threads 2

      - name: Check step.7
        shell: bash
        run: |
          set -euo pipefail
          git checkout --force step.7
          cargo fmt --check
          cargo check --locked
          timeout 180s cargo run --release --locked -- --ci --threads 2

      - name: Check step.7.solution
        shell: bash
        run: |
          set -euo pipefail
          git checkout --force step.7.solution
          cargo fmt --check
          cargo check --locked
          timeout 180s cargo run --release --locked -- --ci --threads 2

      - name: Stop Bitcoin Core
        if: always()
        run: ./bitcoin-core/bin/bitcoin-cli -datadir="${GITHUB_WORKSPACE}/bitcoin" stop || true
